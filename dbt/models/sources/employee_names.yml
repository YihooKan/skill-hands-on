---
# employee_names.sql

version: 2

models:
  - name: employee_names
    description: "A model that selects employee names from the employees table."
    columns:
      - name: employee_id
        description: "The unique identifier for each employee."
        data_tests:
          - not_null
          - unique
      - name: full_name
        description: >
          "The full name of the employee, concatenated from first
          and last names."
        data_tests:
          - not_null

unit_tests:
  - name: test_employee_name_should_not_be_empty
    description: >
      "Test the employee names can concat correctly by first and last names."
    model: employee_names
    overrides:
      macros:
        is_incremental: false
    given:
      - input: source('skill_hands_on_source', 'employees')
        rows:
          - first_name: "John"
            last_name: "Doe"
          - first_name: "Jane"
            last_name: "Smith"

    expect:
      rows:
        - full_name: "John Doe"
        - full_name: "Jane Smith"
